name: release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - name: Create GitHub Release
              run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Stable Release ${{ github.ref_name }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
