name: git-invader
description: Generate a Space Invaders SVG animation from your GitHub contribution graph
author: patel-vardhman

inputs:
    github_token:
        description: GitHub token with repo read access
        required: true
    github_username:
        description: GitHub username to fetch contributions for
        required: true
    output_dir:
        description: Directory to write SVG files into
        required: false
        default: dist
    color:
        description: "Accent color: green | blue | orange | pink | yellow | multi  (leave blank for all)"
        required: false
        default: ""
    mode:
        description: "Theme mode: dark | light  (leave blank for both)"
        required: false
        default: ""
    ship:
        description: "Ship variant: rocket | saucer | delta | cruiser | viper | phantom | hornet | wraith | specter | predator | eclipse | nova  (leave blank to auto-select from commit count)"
        required: false
        default: ""

runs:
    using: docker
    image: Dockerfile
